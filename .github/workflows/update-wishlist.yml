name: Update Wishlist Data

on:
  schedule:
    - cron: "0 8 * * 1" # Every Monday at 08:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Discover plugin opportunities
        run: python scripts/discover-opportunities.py
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rescue voted packages below threshold
        run: node scripts/rescue-voted.mjs
        env:
          NEXT_PUBLIC_UPSTASH_REDIS_REST_URL: ${{ secrets.NEXT_PUBLIC_UPSTASH_REDIS_REST_URL }}
          NEXT_PUBLIC_UPSTASH_REDIS_REST_TOKEN: ${{ secrets.NEXT_PUBLIC_UPSTASH_REDIS_REST_TOKEN }}

      - name: Generate wishlist
        run: node scripts/fetch-wishlist.mjs

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/opportunities.json src/data/wishlist-candidates.json src/data/wishlist.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update wishlist data (automated weekly)"
            git push
          fi
