name: Update Plugin Data

on:
  schedule:
    - cron: "0 6 * * 1" # Every Monday at 06:00 UTC
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: flyteorg/flytekit
          path: flytekit

      - uses: actions/checkout@v4
        with:
          repository: flyteorg/flyte-sdk
          path: flyte-sdk

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Generate plugin data
        env:
          FLYTEKIT_PATH: ${{ github.workspace }}/flytekit/plugins
          FLYTE_SDK_PATH: ${{ github.workspace }}/flyte-sdk/plugins
          GH_TOKEN: ${{ github.token }}
        run: node scripts/generate-plugin-data.mjs

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet src/data/plugins.json || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/plugins.json
          git commit -m "chore: update plugin data"
          git push
